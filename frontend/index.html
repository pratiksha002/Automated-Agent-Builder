<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign In — Agent Builder</title>
  <link rel="stylesheet" href="css/global.css" />
  <link rel="stylesheet" href="css/auth.css" />
</head>
<body>
  <div class="auth-page">
    <div class="auth-card">

      <div class="auth-logo">Agent<span>Builder</span></div>

      <!-- ── Login Form ── -->
      <div id="login-form">
        <h1 class="auth-title">Welcome back.</h1>
        <p class="auth-subtitle">Sign in to your account to continue.</p>

        <form class="auth-form" onsubmit="return false;">
          <div class="form-group">
            <label for="login-email">Email</label>
            <input id="login-email" type="email" placeholder="you@example.com" autocomplete="email" required />
          </div>
          <div class="form-group">
            <label for="login-password">Password</label>
            <input id="login-password" type="password" placeholder="••••••••" autocomplete="current-password" required />
          </div>
          <p class="error-msg" id="login-error"></p>
          <button type="submit" class="btn btn-primary">Sign in</button>
        </form>

        <div class="auth-switch">
          Don't have an account?
          <a id="show-register">Create one</a>
        </div>
      </div>

      <!-- ── Register Form ── -->
      <div id="register-form" style="display:none;">
        <h1 class="auth-title">Create account.</h1>
        <p class="auth-subtitle">Start building AI agents in minutes.</p>

        <form class="auth-form" onsubmit="return false;">
          <div class="form-group">
            <label for="register-name">Full Name</label>
            <input id="register-name" type="text" placeholder="Your name" required />
          </div>
          <div class="form-group">
            <label for="register-email">Email</label>
            <input id="register-email" type="email" placeholder="you@example.com" required />
          </div>
          <div class="form-group">
            <label for="register-password">Password</label>
            <input id="register-password" type="password" placeholder="Choose a password" required />
          </div>
          <p class="error-msg" id="register-error"></p>
          <button type="submit" class="btn btn-primary">Create account</button>
        </form>

        <div class="auth-switch">
          Already have an account?
          <a id="show-login">Sign in</a>
        </div>
      </div>

    </div>
  </div>

  <script type="module" src="js/auth.js"></script>
</body>
</html>
