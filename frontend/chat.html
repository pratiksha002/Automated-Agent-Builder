<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Chat — Agentive</title>
  <link rel="stylesheet" href="css/global.css"/>
  <link rel="stylesheet" href="css/chat.css"/>
  <link rel="stylesheet" href="css/animations.css"/>
</head>
<body>
<div class="chat-layout">

  <nav class="navbar">
    <div class="navbar-logo">Agent<span>ive</span></div>
    <div class="navbar-right">
      <button class="btn btn-ghost btn-sm" onclick="window.location.href='dashboard.html'">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
          style="width:13px;height:13px"><line x1="19" y1="12" x2="5" y2="12"/>
          <polyline points="12 19 5 12 12 5"/></svg>
        Dashboard
      </button>
      <button class="btn btn-ghost btn-sm" id="logout-btn">Sign out</button>
    </div>
  </nav>

  <aside class="sidebar">
    <div class="sidebar-head">
      <span class="sidebar-head-title">Conversations</span>
      <button class="btn btn-ghost btn-sm" id="new-chat-btn">+ New</button>
    </div>
    <div class="sidebar-search">
      <input type="text" id="sidebar-search" placeholder="Search conversations…"/>
    </div>
    <div class="sidebar-list" id="sidebar-list">
      <p class="sidebar-empty">Loading…</p>
    </div>
  </aside>

  <div class="chat-area">

    <!-- Header with provider badge + switch button -->
    <div class="chat-header">
      <div class="chat-header-info">
        <div class="chat-agent-name" id="chat-agent-name">Agent</div>
        <div class="chat-agent-sub" id="chat-agent-sub"></div>
      </div>
      <!-- Provider badge -->
      <div class="provider-badge groq" id="provider-badge">
        <span class="provider-badge-dot"></span>
        <span id="provider-label">Groq</span>
      </div>
      <!-- Manual switch button -->
      <button class="switch-provider-btn" id="switch-provider-btn" title="Switch inference provider">
        Switch to Ollama
      </button>
      <div class="chat-status">
        <div class="chat-status-dot"></div>
        online
      </div>
    </div>

    <!-- Fallback notification banner -->
    <div class="fallback-banner" id="fallback-banner">
      <span class="fallback-banner-icon">⚡</span>
      <span>
        Groq rate limit reached — automatically switched to
        <strong>Ollama (local)</strong>.
        Your full conversation history is preserved.
      </span>
      <button class="fallback-banner-close" id="fallback-banner-close">Dismiss</button>
    </div>

    <!-- Welcome state -->
    <div id="chat-welcome" class="chat-welcome">
      <div class="chat-welcome-icon">
        <svg viewBox="0 0 24 24"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
      </div>
      <div id="chat-greeting" style="text-align:center;margin-bottom:24px"></div>
      <div class="starters" id="starters"></div>
    </div>

    <!-- Messages + input -->
    <div id="chat-content" style="display:none;flex-direction:column;flex:1;overflow:hidden;">
      <div class="messages" id="messages"></div>
      <div class="input-bar">
        <div class="input-wrap">
          <textarea id="chat-input" rows="1"
            placeholder="Type a message… (Enter to send · Shift+Enter for newline)"></textarea>
          <button class="send-btn" id="send-btn" title="Send">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
              stroke-linecap="round" stroke-linejoin="round">
              <line x1="12" y1="19" x2="12" y2="5"/>
              <polyline points="5 12 12 5 19 12"/>
            </svg>
          </button>
        </div>
        <div class="input-meta">
          <span class="input-hint">Enter to send · Shift+Enter for newline</span>
          <span class="char-count" id="char-count">0</span>
        </div>
      </div>
    </div>

  </div>
</div>

<script type="module" src="js/chat.js"></script>
<script type="module" src="js/animations.js"></script>
</body>
</html>
