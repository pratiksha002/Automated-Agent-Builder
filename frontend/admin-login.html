<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Login — Agent Builder</title>
  <link rel="stylesheet" href="css/global.css" />
  <link rel="stylesheet" href="css/auth.css" />
</head>
<body>
  <div class="auth-page">
    <div class="auth-card">
      <div class="auth-logo">Agent<span>Builder</span> <span style="color:var(--danger);margin-left:8px;">ADMIN</span></div>

      <div>
        <h1 class="auth-title">Admin access.</h1>
        <p class="auth-subtitle">Restricted to platform administrators only.</p>

        <form class="auth-form" onsubmit="return false;" id="admin-login-form">
          <div class="form-group">
            <label for="admin-email">Email</label>
            <input id="admin-email" type="email" placeholder="admin@agentbuilder.com" required />
          </div>
          <div class="form-group">
            <label for="admin-password">Password</label>
            <input id="admin-password" type="password" placeholder="••••••••" required />
          </div>
          <p class="error-msg" id="admin-login-error"></p>
          <button type="submit" class="btn btn-primary">Sign in as Admin</button>
        </form>
      </div>
    </div>
  </div>

  <script type="module">
    if (sessionStorage.getItem('admin_token')) {
      window.location.href = '/admin.html';
    }

    const form  = document.getElementById('admin-login-form');
    const error = document.getElementById('admin-login-error');

    form.addEventListener('submit', async () => {
      error.textContent = '';
      const email    = document.getElementById('admin-email').value.trim();
      const password = document.getElementById('admin-password').value;
      const btn      = form.querySelector('button[type=submit]');

      btn.disabled = true;
      btn.textContent = 'Signing in...';

      try {
        const res = await fetch('http://localhost:8001/api/v1/admin/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password }),
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.detail || 'Login failed');
        sessionStorage.setItem('admin_token', data.access_token);
        window.location.href = '/admin.html';
      } catch (err) {
        error.textContent = err.message;
        btn.disabled = false;
        btn.textContent = 'Sign in as Admin';
      }
    });
  </script>
</body>
</html>
