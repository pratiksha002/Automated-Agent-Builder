<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Admin — Agentive</title>
  <link rel="stylesheet" href="css/global.css"/>
  <link rel="stylesheet" href="css/admin.css"/>
</head>
<body>
<div class="admin-login-page">
  <div class="admin-login-card">

    <div class="admin-logo">
      <div class="navbar-logo" style="margin:0">Agent<span>ive</span></div>
      <span class="admin-logo-badge">Admin</span>
    </div>

    <h1 class="admin-login-title">Admin access.</h1>
    <p class="admin-login-sub">Restricted to platform administrators only.</p>

    <form class="admin-form" id="admin-form" onsubmit="return false">
      <div class="form-group">
        <label for="admin-email">Email</label>
        <input id="admin-email" type="email"
          placeholder="admin@agentive.com" autocomplete="email" required/>
      </div>
      <div class="form-group">
        <label for="admin-password">Password</label>
        <input id="admin-password" type="password"
          placeholder="••••••••" required/>
      </div>
      <p class="error-msg" id="admin-error"></p>
      <button type="submit" class="btn btn-primary">Sign in as Admin</button>
    </form>

    <p style="margin-top:20px;font-size:12px;color:var(--text-3);font-family:var(--font-mono);text-align:center">
      <a href="index.html" style="color:var(--text-3)">← Back to home</a>
    </p>
  </div>
</div>

<script type="module">
  const BASE = 'https://automated-agent-builder.onrender.com';

  document.getElementById('admin-form').addEventListener('submit', async e => {
    e.preventDefault();
    const errEl = document.getElementById('admin-error');
    const btn   = e.target.querySelector('button[type=submit]');
    errEl.textContent = '';
    btn.disabled = true; btn.textContent = 'Signing in…';

    const email    = document.getElementById('admin-email').value.trim();
    const password = document.getElementById('admin-password').value;

    try {
      const res = await fetch(`${BASE}/api/v1/admin/login`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email, password }),
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.detail || 'Invalid credentials');

      sessionStorage.setItem('admin_token', data.access_token);
      window.location.href = '/admin-dashboard.html';
    } catch (err) {
      errEl.textContent = err.message;
      btn.disabled = false; btn.textContent = 'Sign in as Admin';
    }
  });
</script>
</body>
</html>
