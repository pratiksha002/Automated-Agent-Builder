<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Dashboard — Agent Builder</title>
  <link rel="stylesheet" href="css/global.css" />
  <link rel="stylesheet" href="css/admin.css" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
</head>
<body>
  <div class="admin-layout">

    <!-- Navbar -->
    <nav class="navbar">
      <div class="navbar-logo">Agent<span>Builder</span>
        <span style="font-family:var(--font-mono);font-size:10px;color:var(--danger);margin-left:10px;font-weight:600;letter-spacing:0.1em;text-transform:uppercase;">Admin</span>
      </div>
      <div class="navbar-right">
        <button class="btn btn-ghost btn-sm" id="logout-btn">Log out</button>
      </div>
    </nav>

    <!-- Main -->
    <main class="admin-main">

      <div class="page-header">
        <h1 class="page-title">Dashboard</h1>
        <p class="page-subtitle">Platform-wide metrics and user management.</p>
      </div>

      <!-- Stats -->
      <div id="stats-bar" class="stats-bar">
        <div class="stat-card skeleton" style="height:88px;"></div>
        <div class="stat-card skeleton" style="height:88px;"></div>
        <div class="stat-card skeleton" style="height:88px;"></div>
        <div class="stat-card skeleton" style="height:88px;"></div>
      </div>

      <!-- Flags Panel -->
      <div class="panel">
        <div class="panel-title">
          Unreviewed Flags
          <span class="badge" id="flag-badge"></span>
        </div>
        <table class="flags-table">
          <thead>
            <tr>
              <th>Type</th>
              <th>Reason</th>
              <th>User</th>
              <th>Date</th>
              <th>Action</th>
            </tr>
          </thead>
          <tbody id="flags-body">
            <tr>
              <td colspan="5" style="color:var(--text-3);font-family:var(--font-mono);font-size:13px;padding:20px 14px;">
                Loading...
              </td>
            </tr>
          </tbody>
        </table>
      </div>

      <!-- Users -->
      <div class="section-label" style="margin-top:8px;">
        All Users
        <input
          id="user-search"
          type="text"
          placeholder="Search by name or email..."
        />
      </div>
      <div class="user-grid" id="user-grid">
        <div class="user-card skeleton" style="height:110px;"></div>
        <div class="user-card skeleton" style="height:110px;"></div>
        <div class="user-card skeleton" style="height:110px;"></div>
      </div>

    </main>
  </div>

  <!-- Drawer -->
  <div class="drawer-overlay" id="drawer-overlay"></div>
  <div class="drawer" id="user-drawer">
    <div id="drawer-content"></div>
  </div>

  <script type="module" src="js/admin.js"></script>
</body>
</html>
